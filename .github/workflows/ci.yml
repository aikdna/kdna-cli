name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm ci
      - run: npx eslint src/ validators/ tests/ --max-warnings 100 || true
      - run: npm run format:check

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm test

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm ci
      - name: Smoke test — CLI help
        run: node src/cli.js help
      - name: Smoke test — version via --help
        run: node src/cli.js --help
      - name: Smoke test — unknown command
        run: node src/cli.js nonexistent 2>&1 | grep -q "Unknown command" && echo "PASS"
      - name: Smoke test — existing smoke test
        run: node tests/smoke/smoke-test.js
