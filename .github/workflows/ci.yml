name: CI
on: [pull_request, push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/checkout@v7
        with:
          repository: aikdna/kdna
          ref: a257b92345af57e6fb20215576bc976a5291b297
          path: .cross-repo/kdna
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: npm ci
      - name: Install exact Core candidate dependencies
        working-directory: .cross-repo/kdna
        run: npm ci
      - name: Verify exact Core candidate dependency isolation
        run: node scripts/verify-core-source-dependencies.js
        env:
          KDNA_CORE_SOURCE_ROOT: ${{ github.workspace }}/.cross-repo/kdna/packages/kdna-core
      - name: Enforce public repository boundary
        run: npm run check:public-surface
      - name: Run the complete CLI suite against the exact Core candidate
        run: npm test
        env:
          KDNA_CORE_SOURCE_ROOT: ${{ github.workspace }}/.cross-repo/kdna/packages/kdna-core
          NODE_OPTIONS: --require=${{ github.workspace }}/tests/helpers/require-golden-core.js
      - name: Pin the candidate pack npm client
        run: |
          npm install --global npm@11.17.0 --ignore-scripts --registry=https://registry.npmjs.org/
          npm --version | grep -Fx 11.17.0
      - name: Verify the exact Core candidate through a reproducible local tar install
        run: npm run test:core-candidate-tar
        env:
          KDNA_CORE_SOURCE_ROOT: ${{ github.workspace }}/.cross-repo/kdna/packages/kdna-core
  golden-host-request:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/checkout@v7
        with:
          repository: aikdna/kdna
          ref: a257b92345af57e6fb20215576bc976a5291b297
          path: .cross-repo/kdna
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: npm ci
      - name: Install exact Core candidate dependencies
        working-directory: .cross-repo/kdna
        run: npm ci
      - name: Verify exact Core candidate dependency isolation
        run: node scripts/verify-core-source-dependencies.js
        env:
          KDNA_CORE_SOURCE_ROOT: ${{ github.workspace }}/.cross-repo/kdna/packages/kdna-core
      - name: Verify Golden Core Capsule through the real process Host path
        run: npm run test:golden-host-request
        env:
          KDNA_GOLDEN_CORE_ROOT: ${{ github.workspace }}/.cross-repo/kdna/packages/kdna-core
  runtime-contract:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [18, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/checkout@v7
        with:
          repository: aikdna/kdna
          ref: a257b92345af57e6fb20215576bc976a5291b297
          path: .cross-repo/kdna-runtime-contract
      - uses: actions/setup-node@v6
        with: { node-version: '${{ matrix.node }}' }
      - run: npm ci
      - name: Verify the current Runtime Capsule and process Host contract
        run: npm run test:runtime-contract
        env:
          KDNA_CORE_SOURCE_ROOT: ${{ github.workspace }}/.cross-repo/kdna-runtime-contract/packages/kdna-core
  evidence:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: npm ci
      - name: Run README command evidence checks
        run: node scripts/evidence-ci.js
